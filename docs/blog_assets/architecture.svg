<svg xmlns="http://www.w3.org/2000/svg" width="720" height="600" viewBox="0 0 720 600" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img"><title>Semantic cache control-plane architecture</title><desc>Query flows through routing, exact/structured match, MariaDB Vector retrieval, facet gates, and a gray-zone judge; passing all reuses a GridGain-cached answer, any failure falls back to a live model call.</desc><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><line x1="165.0" y1="90" x2="165.0" y2="116" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/><line x1="165.0" y1="168" x2="165.0" y2="194" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/><line x1="165.0" y1="246" x2="165.0" y2="272" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/><line x1="165.0" y1="324" x2="165.0" y2="350" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/><line x1="165.0" y1="402" x2="165.0" y2="428" stroke="#888780" stroke-width="1.5" marker-end="url(#ah)"/><line x1="165.0" y1="480" x2="165.0" y2="506" stroke="#639922" stroke-width="1.5" marker-end="url(#ah)"/><rect x="430" y="118" width="250" height="362" rx="8" fill="none" stroke="#888780" stroke-width="0.7" stroke-dasharray="5 4"/><text x="555" y="282" font-size="14" font-weight="500" fill="#3f3f3c" text-anchor="middle">Live answer</text><text x="555" y="302" font-size="12" fill="#73726c" text-anchor="middle">call the model</text><text x="555" y="330" font-size="12" fill="#73726c" text-anchor="middle">fail-safe: never a wrong reuse</text><line x1="290" y1="143" x2="428" y2="160" stroke="#C25B3A" stroke-width="1.3" marker-end="url(#ah)"/><line x1="290" y1="221" x2="428" y2="210" stroke="#C25B3A" stroke-width="1.3" marker-end="url(#ah)"/><line x1="290" y1="299" x2="428" y2="270" stroke="#C25B3A" stroke-width="1.3" marker-end="url(#ah)"/><line x1="290" y1="377" x2="428" y2="330" stroke="#C25B3A" stroke-width="1.3" marker-end="url(#ah)"/><line x1="290" y1="455" x2="428" y2="392" stroke="#C25B3A" stroke-width="1.3" marker-end="url(#ah)"/><text x="365" y="438" font-size="12" fill="#73726c" text-anchor="middle">any check fails</text><rect x="40" y="40" width="250" height="50" rx="6" fill="#f1efe8" stroke="#888780" stroke-width="0.7"/><text x="165.0" y="62" font-size="14" font-weight="500" fill="#3f3f3c" text-anchor="middle">Incoming query</text><text x="165.0" y="79" font-size="11.5" fill="#73726c" text-anchor="middle">embed once</text><rect x="40" y="118" width="250" height="50" rx="6" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.7"/><text x="165.0" y="140" font-size="14" font-weight="500" fill="#3f3f3c" text-anchor="middle">Routing classifier</text><text x="165.0" y="157" font-size="11.5" fill="#73726c" text-anchor="middle">cacheable at all? skip actions, freshness</text><rect x="40" y="196" width="250" height="50" rx="6" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.7"/><text x="165.0" y="218" font-size="14" font-weight="500" fill="#3f3f3c" text-anchor="middle">Exact + structured match</text><text x="165.0" y="235" font-size="11.5" fill="#73726c" text-anchor="middle">identifiers must match</text><rect x="40" y="274" width="250" height="50" rx="6" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.7"/><text x="165.0" y="296" font-size="14" font-weight="500" fill="#3f3f3c" text-anchor="middle">Vector retrieval</text><text x="165.0" y="313" font-size="11.5" fill="#73726c" text-anchor="middle">scoped ANN - MariaDB Vector</text><rect x="40" y="352" width="250" height="50" rx="6" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.7"/><text x="165.0" y="374" font-size="14" font-weight="500" fill="#3f3f3c" text-anchor="middle">Facet gates</text><text x="165.0" y="391" font-size="11.5" fill="#73726c" text-anchor="middle">entities, quantities, polarity</text><rect x="40" y="430" width="250" height="50" rx="6" fill="#e6f1fb" stroke="#378ADD" stroke-width="0.7"/><text x="165.0" y="452" font-size="14" font-weight="500" fill="#3f3f3c" text-anchor="middle">Gray-zone judge</text><text x="165.0" y="469" font-size="11.5" fill="#73726c" text-anchor="middle">would it answer the query?</text><rect x="40" y="508" width="250" height="50" rx="6" fill="#e7f3e0" stroke="#639922" stroke-width="0.7"/><text x="165.0" y="530" font-size="14" font-weight="500" fill="#3f3f3c" text-anchor="middle">Reuse cached answer</text><text x="165.0" y="547" font-size="11.5" fill="#73726c" text-anchor="middle">served from GridGain cache</text><rect x="40" y="565" width="11" height="11" rx="2" fill="#378ADD"/><text x="57" y="575" font-size="12" fill="#73726c">engine checks</text><rect x="170" y="565" width="11" height="11" rx="2" fill="#639922"/><text x="187" y="575" font-size="12" fill="#73726c">reuse</text><rect x="250" y="565" width="11" height="11" rx="2" fill="#888780"/><text x="267" y="575" font-size="12" fill="#73726c">live model call</text></svg>
