<svg xmlns="http://www.w3.org/2000/svg" width="720" height="426" viewBox="0 0 720 426" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img"><title>False reuse rate by trap type</title><desc>Baseline false reuse: all traps 51%, identifier swap and negation 100%, freshness 50%, others 20-38%. Our stack: 0% on every type.</desc><text x="20" y="26" font-size="15" font-weight="500" fill="#3f3f3c">False reuse rate by trap type (% of must-miss traps wrongly served)</text><rect x="20" y="38" width="11" height="11" rx="2" fill="#E24B4A"/><text x="36" y="48" font-size="12" fill="#73726c">cosine-only baseline</text><rect x="190" y="38" width="11" height="11" rx="2" fill="#639922"/><text x="206" y="48" font-size="12" fill="#73726c">our stack (0% every type)</text><line x1="160.0" y1="52" x2="160.0" y2="380" stroke="#e7e5df" stroke-width="1"/><text x="160.0" y="396" font-size="11" fill="#73726c" text-anchor="middle">0%</text><line x1="280.0" y1="52" x2="280.0" y2="380" stroke="#e7e5df" stroke-width="1"/><text x="280.0" y="396" font-size="11" fill="#73726c" text-anchor="middle">25%</text><line x1="400.0" y1="52" x2="400.0" y2="380" stroke="#e7e5df" stroke-width="1"/><text x="400.0" y="396" font-size="11" fill="#73726c" text-anchor="middle">50%</text><line x1="520.0" y1="52" x2="520.0" y2="380" stroke="#e7e5df" stroke-width="1"/><text x="520.0" y="396" font-size="11" fill="#73726c" text-anchor="middle">75%</text><line x1="640.0" y1="52" x2="640.0" y2="380" stroke="#e7e5df" stroke-width="1"/><text x="640.0" y="396" font-size="11" fill="#73726c" text-anchor="middle">100%</text><text x="150" y="64" font-size="12" fill="#3f3f3c" text-anchor="end">All traps</text><rect x="160" y="45" width="243.6" height="14" rx="3" fill="#E24B4A"/><text x="409.6" y="59" font-size="12" font-weight="500" fill="#A32D2D">51%</text><rect x="160" y="61" width="2" height="14" rx="1" fill="#639922"/><text x="166" y="74" font-size="12" font-weight="500" fill="#3B6D11">0%</text><text x="150" y="106