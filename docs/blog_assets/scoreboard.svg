<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img"><title>Head-to-head scoreboard</title><desc>False reuse: our stack 0%, baseline 51%. Recall: our stack 67%, baseline 56%.</desc><text x="20" y="26" font-size="15" font-weight="500" fill="#3f3f3c">94 banking queries, identical embeddings - our stack vs cosine-only baseline</text><text x="395" y="62" font-size="13" font-weight="500" fill="#3f3f3c" text-anchor="middle">Our stack</text><text x="605" y="62" font-size="13" font-weight="500" fill="#73726c" text-anchor="middle">Cosine-only baseline</text><rect x="24" y="78" width="250" height="76" rx="8" fill="#f4f3ee"/><text x="40" y="110" font-size="14" font-weight="500" fill="#3f3f3c">False reuse</text><text x="40" y="130" font-size="12" fill="#73726c">wrong answers - lower better</text><rect x="300" y="78" width="190" height="76" rx="8" fill="#e7f3e0"/><text x="395" y="120" font-size="30" font-weight="500" fill="#3B6D11" text-anchor="middle">0%</text><text x="395" y="140" font-size="12" fill="#3B6D11" text-anchor="middle">0 of 67 traps</text><rect x="510" y="78" width="190" height="76" rx="8" fill="#fbe6e6"/><text x="605" y="120" font-size="30" font-weight="500" fill="#A32D2D" text-anchor="middle">51%</text><text x="605" y="140" font-size="12" fill="#A32D2D" text-anchor="middle">34 of 67 traps</text><rect x="24" y="166" width="250" height="76" rx="8" fill="#f4f3ee"/><text x="40" y="198" font-size="14" font-weight="500" fill="#3f3f3c">Recall</text><text x="40" y="218" font-size="12" fill="#73726c">paraphrases reused - higher better</text><rect x="300" y="166" width="190" height="76" rx="8" fill="#e7f3e0"/><text x="395" y="208" font-size="30" font-weight="500" fill="#3B6D11" text-anchor="middle">67%</text><text x="395" y="228" font-size="12" fill="#3B6D11" text-anchor="middle">18 of 27</text><rect x="510" y="166" width="190" height="76" rx="8" fill="#f4f3ee"/><text x="605" y="208" font-size="30" font-weight="500" fill="#73726c" text-anchor="middle">56%</text><text x="605" y="228" font-size="12" fill="#73726c" text-anchor="middle">15 of 27</text><text x="24" y="266" font-size="12" fill="#73726c">Better on both axes - lower false reuse and higher recall. The baseline is strictly dominated.</text></svg>
